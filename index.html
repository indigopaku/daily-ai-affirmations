<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Affirmations 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Comic Neue', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    text-align: center;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    color: #4a148c;
    padding: 20px;
  }

  #affirmation {
    font-size: 2em;
    margin: 20px;
    opacity: 0;
    animation: fadeIn 1s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  button {
    padding: 12px 24px;
    font-size: 1em;
    cursor: pointer;
    background: #4a148c;
    color: white;
    border: none;
    border-radius: 12px;
    transition: transform 0.2s, background 0.2s;
    margin: 5px;
  }

  button:hover {
    transform: scale(1.1);
    background: #7b1fa2;
  }
</style>
</head>
<body>

<h1>🌸 Daily Affirmation 🌸</h1>
<div id="affirmation">Loading...</div>
<button onclick="getAffirmation()">Get Another Affirmation</button>
<button onclick="shareAffirmation()">Share ❤️</button>

<script>
async function getAffirmation() {
  try {
    const res = await fetch('https://daily-ai-affirmations-wqp5-c0oo4ir5q-indigopakus-projects.vercel.app/api/today'); 
    // <-- Replace with your Vercel URL
    const data = await res.json();
    document.getElementById('affirmation').innerText = data.affirmation;
  } catch(err) {
    document.getElementById('affirmation').innerText = "You are amazing and loved 💖";
  }
}

// Open Twitter share
function shareAffirmation() {
  const text = encodeURIComponent(document.getElementById('affirmation').innerText);
  const url = `https://twitter.com/intent/tweet?text=${text}`;
  window.open(url, "_blank");
}

// Load affirmation when page opens
getAffirmation();
</script>

</body>
</html>
