<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily Affirmation</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #fddde6, #ffe6f0);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }
  h1 { font-family: 'Pacifico', cursive; color: #e91e63; font-size: 3rem; margin-bottom: 0.5rem;}
  #date { font-size: 1.2rem; color: #555; margin-bottom: 2rem;}
  #affirmation { font-size: 1.8rem; color: #d81b60; max-width: 600px; line-height: 1.5;}
</style>
</head>
<body>
<h1>🌸 AI Daily Affirmation 🌸</h1>
<div id="date"></div>
<div id="affirmation">Loading your affirmation...</div>

<script>
async function fetchAIMessage() {
  const today = new Date();
  document.getElementById('date').innerText = today.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  // Call your backend route to get AI-generated affirmation
  try {
    const response = await fetch('/api/affirmation');
    const data = await response.json();
    document.getElementById('affirmation').innerText = data.affirmation;
  } catch (error) {
    document.getElementById('affirmation').innerText = "Oops! Something went wrong. Please try again later.";
    console.error(error);
  }
}

fetchAIMessage();
</script>
</body>
</html>
