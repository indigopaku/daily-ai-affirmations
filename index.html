<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Affirmation 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Comic Neue', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    text-align: center;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    color: #4a148c;
    margin: 0;
    padding: 20px;
  }

  #card {
    background: rgba(255,255,255,0.2);
    padding: 40px 50px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 500px;
    text-align: center;
  }

  #affirmation {
    font-size: 2em;
    margin: 20px 0;
    opacity: 0;
    animation: fadeIn 1s forwards;
  }

  #date {
    font-size: 1em;
    color: #7b1fa2;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  button {
    padding: 12px 24px;
    font-size: 1em;
    cursor: pointer;
    background: #4a148c;
    color: white;
    border: none;
    border-radius: 12px;
    transition: transform 0.2s, background 0.2s;
    margin: 5px;
  }

  button:hover {
    transform: scale(1.1);
    background: #7b1fa2;
  }
</style>
</head>
<body>

<div id="card">
  <h1>🌸 Daily Affirmation 🌸</h1>
  <div id="affirmation">Loading...</div>
  <p id="date"></p>
  <button onclick="getAffirmation()">Get New Affirmation</button>
  <button onclick="shareAffirmation()">Share ❤️</button>
</div>

<script>
async function getAffirmation() {
  try {
    // <-- Replace with your deployed backend URL
    const res = await fetch('https://daily-ai-affirmations-wqp5-c0oo4ir5q-indigopakus-projects.vercel.app/api/today'); 
    const data = await res.json();

    const div = document.getElementById('affirmation');
    div.style.opacity = 0; // fade out
    setTimeout(() => {
      div.innerText = data.affirmation;
      div.style.animation = 'fadeIn 1s forwards'; // fade in
    }, 300);

    document.getElementById('date').innerText = data.date;
  } catch(err) {
    document.getElementById('affirmation').innerText = "You are amazing and loved 💖";
    document.getElementById('date').innerText = "";
  }
}

function shareAffirmation() {
  const text = encodeURIComponent(document.getElementById('affirmation').innerText);
  const url = `https://twitter.com/intent/tweet?text=${text}`;
  window.open(url, "_blank");
}

// Load one affirmation on page load
getAffirmation();
</script>

</body>
</html>
