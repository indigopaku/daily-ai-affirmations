<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Daily Affirmation 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Comic Neue', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    text-align: center;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    color: #4a148c;
    margin: 0;
    padding: 20px;
  }

  #card {
    background: rgba(255,255,255,0.2);
    padding: 40px 50px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 550px;
    text-align: center;
  }

  #affirmation {
    font-size: 1.9em;
    margin: 20px 0;
    line-height: 1.4em;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #date {
    font-size: 1.1em;
    color: #7b1fa2;
    margin-bottom: 15px;
  }

  select, button {
    padding: 10px 20px;
    font-size: 1em;
    margin: 5px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
  }

  button {
    background: #4a148c;
    color: white;
    transition: transform 0.2s, background 0.2s;
  }

  button:hover {
    transform: scale(1.1);
    background: #7b1fa2;
  }

  select {
    background: white;
    color: #4a148c;
  }
</style>
</head>
<body>

<div id="card">
  <h1>🌸 Deep Daily Affirmation 🌸</h1>

  <label for="category">Choose affirmation type:</label>
  <select id="category">
    <option value="self-love">Self-Love</option>
    <option value="confidence">Confidence</option>
    <option value="motivation">Motivation</option>
    <option value="gratitude">Gratitude</option>
    <option value="mindfulness">Mindfulness</option>
  </select>

  <p id="date"></p>
  <div id="affirmation">Loading...</div>
  <button onclick="getAffirmation()">Get New Affirmation</button>
  <button onclick="shareAffirmation()">Share ❤️</button>
</div>

<script>
async function getAffirmation() {
  try {
    const category = document.getElementById('category').value;
    const res = await fetch(`/api/today?category=${category}`);
    const data = await res.json();

    const fullDate = new Date(data.date);
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('date').innerText = fullDate.toLocaleDateString(undefined, options);

    const div = document.getElementById('affirmation');
    div.style.opacity = 0;
    setTimeout(() => {
      div.innerText = data.affirmation;
      div.style.opacity = 1;
    }, 300);

  } catch(err) {
    console.error(err);
    document.getElementById('affirmation').innerText = "You are resilient, loved, and capable 💖";
    document.getElementById('date').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', year:'numeric', month:'long', day:'numeric' });
  }
}

function shareAffirmation() {
  const text = encodeURIComponent(document.getElementById('affirmation').innerText);
  const url = `https://twitter.com/intent/tweet?text=${text}`;
  window.open(url, "_blank");
}

// Load first affirmation on page load
getAffirmation();
</script>

</body>
</html>
